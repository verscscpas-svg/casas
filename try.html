<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Moving Images Loop</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #111;
      }

      /* Container */
      .marquee-container {
        width: 100%;
        overflow: hidden;
        position: relative;
      }

      /* Track */
      .marquee-track {
        display: flex;
        width: calc(260px * 10);
        animation: moveLeft 20s linear infinite;
      }

      /* Item */
      .marquee-item {
        width: 250px;
        height: 150px;
        flex-shrink: 0;
        margin: 10px;
      }

      /* Image */
      .marquee-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 12px;
      }

      /* Animation */
      @keyframes moveLeft {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }

      /* ========================= */
      /* 📱 TABLET (768px pababa) */
      /* ========================= */
      @media (max-width: 768px) {
        .marquee-item {
          width: 180px;
          height: 110px;
          margin: 8px;
        }

        .marquee-track {
          animation: moveLeft 15s linear infinite;
        }
      }

      /* ========================= */
      /* 📱 MOBILE (480px pababa) */
      /* ========================= */
      @media (max-width: 480px) {
        .marquee-item {
          width: 140px;
          height: 90px;
          margin: 6px;
        }

        .marquee-track {
          animation: moveLeft 10s linear infinite;
        }
      }
    </style>
  </head>

  <body>
    <div class="marquee-container">
      <div class="marquee-track">
        <!-- ORIGINAL -->
        <div class="marquee-item">
          <img src="https://picsum.photos/300/200?1" />
        </div>
        <div class="marquee-item">
          <img src="https://picsum.photos/300/200?2" />
        </div>
        <div class="marquee-item">
          <img src="https://picsum.photos/300/200?3" />
        </div>
        <div class="marquee-item">
          <img src="https://picsum.photos/300/200?4" />
        </div>
        <div class="marquee-item">
          <img src="https://picsum.photos/300/200?5" />
        </div>

        <!-- DUPLICATE -->
        <div class="marquee-item">
          <img src="https://picsum.photos/300/200?1" />
        </div>
        <div class="marquee-item">
          <img src="https://picsum.photos/300/200?2" />
        </div>
        <div class="marquee-item">
          <img src="https://picsum.photos/300/200?3" />
        </div>
        <div class="marquee-item">
          <img src="https://picsum.photos/300/200?4" />
        </div>
        <div class="marquee-item">
          <img src="https://picsum.photos/300/200?5" />
        </div>
      </div>
    </div>
  </body>
</html>
