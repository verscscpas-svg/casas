<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Clients Profile</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #eef2f3, #ffffff);
        padding: 20px;
      }

      h2 {
        text-align: center;
        color: #333;
        margin-bottom: 20px;
        animation: fadeDown 1s ease;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background-color: #fff;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        border-radius: 10px;
        overflow: hidden;
        animation: fadeUp 1s ease;
      }

      th,
      td {
        padding: 14px 16px;
        text-align: left;
        transition: all 0.3s ease;
      }

      th {
        background: gray;
        color: white;
        font-size: 16px;
        letter-spacing: 1px;
      }

      tr {
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      tr:nth-child(even) {
        background-color: #f7f7f7;
      }

      tr:hover {
        transform: scale(1.01);
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
        background-color: #e8f5e9;
      }

      td.industry {
        font-weight: bold;
        background-color: #f0f0f0;
      }

      td.empty {
        text-align: center;
        color: #aaa;
        font-style: italic;
      }

      ul {
        margin: 0;
        padding-left: 18px;
      }

      li {
        margin-bottom: 5px;
        opacity: 0;
        transform: translateX(-10px);
        animation: slideIn 0.5s forwards;
      }

      /* stagger animation */
      li:nth-child(1) {
        animation-delay: 0.1s;
      }
      li:nth-child(2) {
        animation-delay: 0.2s;
      }
      li:nth-child(3) {
        animation-delay: 0.3s;
      }
      li:nth-child(4) {
        animation-delay: 0.4s;
      }
      li:nth-child(5) {
        animation-delay: 0.5s;
      }
      li:nth-child(6) {
        animation-delay: 0.6s;
      }
      li:nth-child(7) {
        animation-delay: 0.7s;
      }
      li:nth-child(8) {
        animation-delay: 0.8s;
      }

      /* animations */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes slideIn {
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
    </style>
  </head>

  <body>
    <h2>Clients Profile</h2>
  </body>
</html>
